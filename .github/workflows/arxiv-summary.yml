name: ArXiv cs.AI 記事取得

on:
  workflow_dispatch:
    inputs:
      count:
        description: '取得件数'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch ArXiv articles
        run: python scripts/fetch_arxiv.py ${{ github.event.inputs.count }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/arxiv-raw-*.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat: ArXiv cs.AI raw data $(date -u '+%Y-%m-%d')"
          git push
