name: Collect and Summarize

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 日時ファイル名生成・収集済みURL抽出・プロンプト構築
      - name: Build prompt
        id: build_prompt
        run: |
          JSONL_FILE="docs/news/$(date -u '+%Y-%m-%d_%H%M').jsonl"
          echo "jsonl_file=$JSONL_FILE" >> $GITHUB_OUTPUT

          EXISTING_URLS=$(python3 -c "
          import glob, json
          urls = set()
          for f in glob.glob('docs/news/*.jsonl'):
              try:
                  with open(f) as fp:
                      for line in fp:
                          line = line.strip()
                          if line:
                              d = json.loads(line)
                              if 'link' in d:
                                  urls.add(d['link'])
              except: pass
          print('\n'.join(sorted(urls)))
          ")
          {
            echo 'prompt<<PROMPT_EOF'
            echo "最新のAI/LLMニュースを収集・要約してください。"
            if [ -n "$EXISTING_URLS" ]; then
              echo ""
              echo "## 収集済みURL（重複のためスキップすること）"
              echo "$EXISTING_URLS"
            fi
            echo 'PROMPT_EOF'
          } >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Gemini CLI
        id: cache-gemini
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: gemini-cli-${{ runner.os }}-v1

      - name: Install Gemini CLI
        if: steps.cache-gemini.outputs.cache-hit != 'true'
        run: |
          npm config set prefix ~/.npm-global
          npm install -g @google/gemini-cli

      - name: Add Gemini CLI to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Restore Gemini credentials
        run: |
          mkdir -p ~/.gemini
          echo "${{ secrets.GEMINI_OAUTH_CREDS }}" | base64 -d > ~/.gemini/oauth_creds.json
          echo '{}' > ~/.gemini/projects.json
          echo '{"selectedAuthType":"oauth-personal"}' > ~/.gemini/settings.json

      # Gemini が調査・要約し、stdoutにJSONLを出力 → Pythonがファイルに保存
      - name: Collect and summarize with Gemini
        env:
          GOOGLE_GENAI_USE_GCA: "true"
          GEMINI_MODEL: gemini-2.5-pro
          GEMINI_YOLO: "true"
          JSONL_FILE: ${{ steps.build_prompt.outputs.jsonl_file }}
        run: |
          mkdir -p docs/news
          gemini -p "${{ steps.build_prompt.outputs.prompt }}" 2>&1 | tee /tmp/gemini_raw.txt || true
          python3 scripts/extract_jsonl.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/news/ 2>/dev/null || true
          git diff --cached --quiet && echo "変更なし" || (
            git commit -m "chore: collect and summarize $(date -u '+%Y-%m-%d')" &&
            git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git &&
            git push
          )
