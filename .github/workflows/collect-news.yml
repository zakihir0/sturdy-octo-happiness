name: Collect AI News

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日 JST 10:00 (UTC 01:00)
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # プロンプトファイルを読み込んで出力変数に格納（多行対応）
      - name: Read prompt file
        id: read_prompt
        run: |
          {
            echo 'prompt<<PROMPT_EOF'
            cat .github/prompts/collect-news.md
            echo 'PROMPT_EOF'
          } >> $GITHUB_OUTPUT

      # Claude Code がRSS取得・要約・JSONL/MD/news_data.json保存を実行
      - name: Collect and summarize news with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Read,Write,WebFetch"
          prompt: ${{ steps.read_prompt.outputs.prompt }}

      # データファイルのみコミット（HTML生成は generate-html.yml が担当）
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/news/ docs/news_data.json logs/
          git diff --cached --quiet && echo "変更なし" || (
            git commit -m "chore: collect AI news $(date -u '+%Y-%m-%d')" && git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
            git push
          )
