name: Collect AI News

on:
  schedule:
    # 毎日 JST 9:00 (UTC 0:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 手動実行も可能

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run news collector
        run: python scripts/collect_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/news.html docs/news_data.json logs/collect_news.log
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update AI news $(date -u '+%Y-%m-%d')"
          git push
