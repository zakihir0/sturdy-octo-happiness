name: Collect AI News

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日 JST 10:00 (UTC 01:00)
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install anthropic

      # プロンプトファイルを読み込んで出力変数に格納（多行対応）
      - name: Read prompt file
        id: read_prompt
        run: |
          {
            echo 'prompt<<PROMPT_EOF'
            cat .github/prompts/collect-news.md
            echo 'PROMPT_EOF'
          } >> $GITHUB_OUTPUT

      # Step 1: Claude Code がRSS取得・要約・JSONL/MD/JSON保存を実行
      - name: Collect and summarize news with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Read,Write,WebFetch"
          prompt: ${{ steps.read_prompt.outputs.prompt }}

      # Step 2: Pythonスクリプトで news.html / index.html を再生成
      - name: Generate HTML
        run: python scripts/collect_news.py

      # Step 3: 変更をコミット・プッシュ
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ logs/
          git diff --cached --quiet && echo "変更なし" || (
            git commit -m "chore: update AI news $(date -u '+%Y-%m-%d')" && git push
          )
