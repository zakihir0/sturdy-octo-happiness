name: Step 1 - Collect URLs

on:
  schedule:
    - cron: 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # プロンプトファイルを読み込んで出力変数に格納（多行対応）
      - name: Read prompt file
        id: read_prompt
        run: |
          {
            echo 'prompt<<PROMPT_EOF'
            cat .github/prompts/collect-urls.md
            echo 'PROMPT_EOF'
          } >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      # Gemini CLI が RSS取得・重複排除・中間JSONL保存を実行
      - name: Collect URLs with Gemini CLI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          GEMINI_YOLO: "true"
        run: gemini -p "${{ steps.read_prompt.outputs.prompt }}"

      # 中間ファイルとログをコミット
      - name: Commit pending URLs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/news/.pending/ logs/
          git diff --cached --quiet && echo "変更なし" || (
            git commit -m "chore: collect URLs $(date -u '+%Y-%m-%d')" &&
            git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git &&
            git push
          )
