name: Step 1 - Collect URLs

on:
  schedule:
    - cron: 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 既存URLをJSONLから抽出してプロンプトに注入（Geminiのファイル読み込みを排除）
      - name: Read prompt file
        id: read_prompt
        run: |
          EXISTING_URLS=$(python3 -c "
          import glob, json
          urls = set()
          for f in glob.glob('docs/news/*.jsonl') + glob.glob('docs/news/.pending/*/*.json'):
              try:
                  with open(f) as fp:
                      for line in fp:
                          line = line.strip()
                          if line:
                              d = json.loads(line)
                              if 'link' in d:
                                  urls.add(d['link'])
              except: pass
          print('\n'.join(sorted(urls)))
          ")
          {
            echo 'prompt<<PROMPT_EOF'
            cat .github/prompts/collect-urls.md
            if [ -n "$EXISTING_URLS" ]; then
              echo ""
              echo "## 収集済みURL（重複のためスキップすること）"
              echo "$EXISTING_URLS"
            fi
            echo 'PROMPT_EOF'
          } >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Gemini CLI
        id: cache-gemini
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: gemini-cli-${{ runner.os }}-v1

      - name: Install Gemini CLI
        if: steps.cache-gemini.outputs.cache-hit != 'true'
        run: |
          npm config set prefix ~/.npm-global
          npm install -g @google/gemini-cli

      - name: Add Gemini CLI to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      # Gemini CLI が RSS取得・重複排除・中間JSONL保存を実行
      - name: Collect URLs with Gemini CLI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          GEMINI_YOLO: "true"
        run: gemini -p "${{ steps.read_prompt.outputs.prompt }}"

      # 中間ファイルとログをコミット
      - name: Commit pending URLs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/news/.pending/ logs/
          git diff --cached --quiet && echo "変更なし" || (
            git commit -m "chore: collect URLs $(date -u '+%Y-%m-%d')" &&
            git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git &&
            git push
          )
