name: Step 2 - Generate Summaries

on:
  workflow_run:
    workflows: ["Step 1 - Collect URLs"]
    types: [completed]
  workflow_dispatch:
    inputs:
      max_articles:
        description: '処理する最大記事数（0 = 全件）'
        required: false
        default: '0'
        type: string

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------
  # list-articles: .pending/ 内のファイルを列挙して matrix を生成する
  # ---------------------------------------------------------------
  list-articles:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      has_articles: ${{ steps.list.outputs.has_articles }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: List pending article files
        id: list
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          PENDING_DIR="docs/news/.pending/${TODAY}"

          if [ -d "$PENDING_DIR" ] && ls "$PENDING_DIR"/*.json 2>/dev/null | head -1 | grep -q .; then
            MAX_ARTICLES="${{ github.event.inputs.max_articles || '0' }}"
            FILES=$(python3 -c "import glob,json; files=sorted(glob.glob('docs/news/.pending/${TODAY}/*.json')); limit=int('${MAX_ARTICLES}'); print(json.dumps(files[:limit] if limit>0 else files))")
            echo "matrix=$FILES" >> "$GITHUB_OUTPUT"
            echo "has_articles=true" >> "$GITHUB_OUTPUT"
            echo "$FILES" | python3 -c "import json,sys; f=json.load(sys.stdin); print(f'{len(f)} 件の未処理記事を検出')"
          else
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_articles=false" >> "$GITHUB_OUTPUT"
            echo "未処理記事なし（スキップ）"
            mkdir -p logs
            printf '[%s] [INFO] generate-summaries: 未処理記事なし（スキップ）\n' \
              "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> logs/collect_news.log
          fi

  # ---------------------------------------------------------------
  # process-article: 記事1件ごとに Gemini CLI を1回起動する
  #   max-parallel: 1 → 直列処理でgit競合を防ぐ
  #   fail-fast: false → 1件失敗しても残りの記事は継続処理
  # ---------------------------------------------------------------
  process-article:
    needs: list-articles
    if: needs.list-articles.outputs.has_articles == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        article_file: ${{ fromJSON(needs.list-articles.outputs.matrix) }}
      max-parallel: 1
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # 前のジョブのコミットを取り込む（直列処理でも checkout タイミングがずれる場合のため）
      - name: Pull latest changes
        run: git pull origin main

      # テンプレートの {{PENDING_ARTICLES}} を記事JSONで置換してプロンプトを構築する
      - name: Build prompt for article
        id: build_prompt
        run: |
          FULL_PROMPT=$(python3 scripts/build_prompt.py '${{ matrix.article_file }}')
          {
            echo 'prompt<<PROMPT_EOF'
            printf '%s' "$FULL_PROMPT"
            echo ''
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Gemini CLI
        id: cache-gemini
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: gemini-cli-${{ runner.os }}-v1

      - name: Install Gemini CLI
        if: steps.cache-gemini.outputs.cache-hit != 'true'
        run: |
          npm config set prefix ~/.npm-global
          npm install -g @google/gemini-cli

      - name: Add Gemini CLI to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      # Gemini CLI が記事本文取得・日本語要約生成・最終ファイル保存を実行
      - name: Generate summary with Gemini CLI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          GEMINI_YOLO: "true"
        run: gemini -p "${{ steps.build_prompt.outputs.prompt }}"

      # 処理済み pending ファイルを削除してコミット
      - name: Commit result and remove pending file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

          rm -f '${{ matrix.article_file }}'

          ARTICLE_NAME=$(basename '${{ matrix.article_file }}' .json)
          git add docs/news/ logs/ docs/news/.pending/
          git diff --cached --quiet && echo "変更なし" || (
            git commit -m "chore: summary ${ARTICLE_NAME} $(date -u '+%Y-%m-%d')" &&
            git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git &&
            git push
          )
