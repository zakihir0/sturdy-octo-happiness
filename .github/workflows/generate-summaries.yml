name: Step 2 - Generate Summaries

on:
  workflow_run:
    workflows: ["Step 1 - Collect URLs"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  generate-summaries:
    runs-on: ubuntu-latest
    # Step 1 が成功した場合、または手動実行の場合に起動
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run 経由では Step 1 のコミット済みファイルを取得するため最新を指定
          ref: main

      # Step 1 の成果物（中間JSONL）を読み込んでプロンプトに注入
      - name: Load pending articles into prompt
        id: build_prompt
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          PENDING_FILE="docs/news/.pending/${TODAY}.jsonl"
          FINAL_FILE="docs/news/${TODAY}.jsonl"
          PROMPT_TEMPLATE=$(cat .github/prompts/generate-summaries.md)

          if [ -f "$PENDING_FILE" ] && [ -s "$PENDING_FILE" ]; then
            # 既処理済みの記事（最終JSONLに存在するlink）を除外し、未処理分のみ注入する
            # → 途中停止後の再実行でも重複せず、未処理の続きから処理できる
            PENDING_CONTENT=$(python3 -c "
import json, os
processed = set()
if os.path.exists('$FINAL_FILE'):
    with open('$FINAL_FILE') as f:
        for line in f:
            line = line.strip()
            if line:
                try:
                    processed.add(json.loads(line)['link'])
                except Exception:
                    pass
remaining = []
with open('$PENDING_FILE') as f:
    for line in f:
        line = line.strip()
        if line:
            try:
                art = json.loads(line)
                if art.get('link') not in processed:
                    remaining.append(line)
            except Exception:
                remaining.append(line)
print('\n'.join(remaining) if remaining else '（収集記事なし - 全記事処理済み）')
")
          else
            PENDING_CONTENT="（収集記事なし - 処理をスキップします）"
          fi

          # テンプレートの {{PENDING_ARTICLES}} プレースホルダーに中間ファイル内容を注入
          FULL_PROMPT="${PROMPT_TEMPLATE/\{\{PENDING_ARTICLES\}\}/$PENDING_CONTENT}"

          {
            echo 'prompt<<PROMPT_EOF'
            printf '%s' "$FULL_PROMPT"
            echo ''
            echo 'PROMPT_EOF'
          } >> $GITHUB_OUTPUT

      # Claude Code が記事本文取得・日本語要約生成・最終ファイル保存を実行
      - name: Generate summaries with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Read,Write,WebFetch"
          prompt: ${{ steps.build_prompt.outputs.prompt }}

      # 最終成果物をコミット
      - name: Commit final outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/news/ docs/news_data.json logs/
          git diff --cached --quiet && echo "変更なし" || (
            git commit -m "chore: generate summaries $(date -u '+%Y-%m-%d')" &&
            git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git &&
            git push
          )
